<!doctype html>
<html>
  <head>

    <title>Mission Viewer</title>

    <link rel="stylesheet" href="styles.css">
    
  </head>
  <body>

    <section id="tablist">
      <!-- Tablist elements-->
    </section>

    <section id="viewport">
      <!-- Viewport elements-->
      <canvas id="canvas"></canvas> <div id="button"></div>
    </section>
    
    <section id="menu">
      <!-- Menu elements-->
      <label for="PointX"> Point X Coordinate : </label>
      <input class="number" type="number" id="PointX">
      
      <br>
      
      <label for="PointY"> Point Y Coordinate : </label>
      <input class="number" type="number" id="PointY">
      
      <br>
      
      <label for="PointD"> Point Direction    : F</label>
      <input class="radio" type="radio" id="PointD" name="PointD">
      
      <label for="PointDB">B</label>
      <input class="radio" type="radio" id="PointDB" name="PointD">
      
      <br>
      
      <label for="PointF"> Point Function     : </label>
      <input class="number" type="number" id="PointF">
      
      <div class="line"></div>

      <label for="RobotW"> Robot Width   : </label>
      <input class="number" type="number" id="RobotW">

      <br>

      <label for="ShowO"> Robot Overlay : </label>
      <input class="check" type="checkbox" id="ShowO">

      <br>

      <label for="ShowI"> Show Information : </label>
      <input class="check" type="checkbox" id="ShowI">

      <div class="line"></div>

      <label for="ExportR"> Export Route : </label>
      <input class="button" type="button" id="ExportR" value="Download">

      <br>

      <label for="ExportP"> Export Points : </label>
      <input class="button" type="button" id="ExportP" value="Download">

      <div class="line"></div>

      <label for="ImportP"> Import Points : </label>
      <input class="button" type="button" id="ImportP" value="File">

      <input class="hidden" type="file" id="FileI" accept=".json,application/json">
      
    </section>

    <script src="js/main.js"></script>
    
  </body>
</html>
