<!doctype html>
<html>
  <head>

    <title>Robot Route Planner V.4.06</title>

    <link rel="stylesheet" href="css/main.css">
    
  </head>
  <body>

    <div id="main">
      
      <section id="tablist">
        <div class="tab"><span class="name">Name</span><div class="options">⋮</div><div class="close">Ｘ</div></div>
        <div class="tab"><span class="name">Name</span><div class="options">⋮</div><div class="close">Ｘ</div></div>
        <div class="tab"><span class="name">Name</span><div class="options">⋮</div><div class="close">Ｘ</div></div>
        <div class="tab"><span class="name">Name</span><div class="options">⋮</div><div class="close">Ｘ</div></div>
        <div class="tab"><span class="name">Name</span><div class="options">⋮</div><div class="close">Ｘ</div></div>
        <div class="add">＋</div>
      </section>

      <section id="viewport">
        <canvas id="canvas"></canvas> <div id="button"></div>
      </section>
      
    </div>

    <section id="menu">
      <label for="PointX">Point X Coordinate :</label>
      <input id="PointX" type="number">
      <br>
      <label for="PointY">Point Y Coordinate :</label>
      <input id="PointY" type="number">
      <br>
      <label for="PointD">Point Direction    :</label>
      <select id="PointD">
        <option value="1">Forwards</option>
        <option value="-1">Backwards</option>
      </select>
      <br>
      <label for="PointA">Point Action       :</label>
      <input id="PointA" type="number">
      <hr>
      <label for="RobotA">Starting Angle     :</label>
      <input id="RobotA" type="number">
      <br>
      <label for="RobotW">Robot Width        :</label>
      <input id="RobotW" type="number">
      <br>
      <label for="ShowO">Show Overlay       :</label>
      <input id="ShowO" type="checkbox">
      <br>
      <label for="ShowI">Show Information   :</label>
      <input id="ShowI" type="checkbox">
      <hr>
      <label for="ExportR">Export Route       :</label>
      <input id="ExportR" type="button" value="Download">
      <br>
      <label for="ExportM">Export Mission     :</label>
      <input id="ExportM" type="button" value="Download">
      <br>
      <label for="ImportM">Import Mission     :</label>
      <input id="ImportM" type="button" value="File">
    </section>

    <!-- SCRIPTS -->
    <script src="js/math.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/mouse.js"></script>
    <script src="js/keyboard.js"></script>
    <script src="js/fields.js"></script>
    <script src="js/routes.js"></script>
    <script src="js/configs.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/missions.js"></script>
    <script src="js/manager.js"></script>
    <script src="js/planner.js"></script>
    <script src="js/display.js"></script>
    <script src="js/inputs.js"></script>
    <script src="js/menu.js"></script>
    <!-- SRIPTS -->
    
    <script src="js/main.js"></script>
    
  </body>
</html>
